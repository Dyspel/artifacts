name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel previous in-flight runs on the same ref — keeps the queue short
# when a developer pushes a fixup over an open PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Smaller, deterministic incremental output. We're caching target/
  # via Swatinem/rust-cache; incremental files would only bloat the cache.
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy --all-targets -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  build-test:
    name: cargo build + test (all targets, all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-test
      # The GUI binary depends on eframe/egui, which pulls in
      # X11/Wayland/GL bindings; the headless runner needs the dev
      # libraries on PATH so the build link step succeeds. Cheap on
      # Ubuntu images (everything is already in apt's index).
      - name: Install GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libxcb1-dev
      - name: Ensure git is on PATH
        # The integration test under tests/ shells out to `git` for
        # clone/push/notes scenarios.
        run: git --version
      - run: cargo build --all-features --all-targets
      - run: cargo test --all-features --all-targets

  supply-chain:
    name: cargo deny + cargo machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
      # Cache only the registry index + advisory-db so subsequent runs
      # don't re-clone RustSec on every PR. cargo-deny itself is fast
      # once installed; the binary is cached by the next step.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: supply-chain
          # cargo-deny / cargo-machete don't build the project; skip
          # the target/ cache that the other jobs share.
          cache-targets: "false"
      # Pinned versions so a surprise upstream behavior change in
      # either tool doesn't break CI silently — bump in lockstep with
      # deny.toml schema changes.
      - name: Install cargo-deny + cargo-machete
        run: |
          cargo install --locked --version 0.19.7 cargo-deny
          cargo install --locked --version 0.9.2 cargo-machete
      # `check` runs advisories + bans + licenses + sources in one
      # pass; the deny.toml in the repo root drives the policy. New
      # rules belong in deny.toml with a why-comment, not in this
      # workflow.
      - name: cargo deny check
        run: cargo deny check
      # Recurring guard for the H4 unused-dep sweep. cargo-machete
      # scans Cargo.toml against actual use; a future PR that adds
      # a dep and doesn't reference it gets caught here.
      - name: cargo machete
        run: cargo machete
