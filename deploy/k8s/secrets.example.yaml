# Example Secret manifest the Deployment expects. Generate the values
# with `openssl rand -hex 32` (or `openssl rand -base64 32` for the
# AES master key) and apply via:
#
#   kubectl apply -f deploy/k8s/secrets.example.yaml
#
# This file is intentionally a template — DO NOT commit a populated
# version. Either keep your real Secret out of git, or manage it via
# sealed-secrets / external-secrets / sops, etc.
apiVersion: v1
kind: Secret
metadata:
  name: artifacts-secrets
  labels:
    app.kubernetes.io/name: artifacts
type: Opaque
stringData:
  # Required.
  ARTIFACTS_ADMIN_TOKEN: "REPLACE_ME"
  ARTIFACTS_JWT_SECRET: "REPLACE_ME"
  # Optional but strongly recommended in prod — pinning the webhook
  # master key here means a pod restart doesn't lose access to
  # encrypted webhook secrets. Base64-encoded 32 bytes.
  # ARTIFACTS_WEBHOOK_KEY: "REPLACE_ME"
